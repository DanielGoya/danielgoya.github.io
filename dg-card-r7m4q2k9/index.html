<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#202124">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">

  <title>Daniel Goya — Tarjeta de contacto</title>
  <meta name="description" content="Tarjeta de contacto de Daniel Goya.">

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">

  <style>
    :root {
      --bg:#efefec;
      --paper:#fcfcfa;
      --ink:#202124;
      --muted:#596873;
      --accent:#667987;
      --line:#dadbd8;
      --soft:#f3f3f0;
      --shadow:0 22px 65px rgba(25,27,29,.16);
      color-scheme:light;
    }

    * {
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body {
      margin:0;
      width:100%;
      min-height:100%;
      overflow-x:hidden;
      background:var(--bg);
      color:var(--ink);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system,
                  BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:12px;
      overscroll-behavior:none;
    }

    button, a { font:inherit; }

    .app {
      position:relative;
      width:min(100%, 620px);
      min-height:calc(100dvh - 24px);
      max-height:980px;
      background:
        radial-gradient(circle at 100% 100%, rgba(102,121,135,.10), transparent 32%),
        radial-gradient(circle at 0% 100%, rgba(102,121,135,.06), transparent 29%),
        var(--paper);
      border:1px solid var(--line);
      border-radius:clamp(28px, 6vw, 52px);
      box-shadow:var(--shadow);
      padding:
        max(18px, env(safe-area-inset-top))
        clamp(16px, 4.5vw, 34px)
        max(48px, env(safe-area-inset-bottom));
      display:grid;
      grid-template-rows:auto auto auto minmax(260px,1fr) auto auto;
      gap:12px;
      overflow:hidden;
    }

    .identity {
      display:grid;
      grid-template-columns:clamp(96px, 27vw, 150px) 1fr;
      gap:clamp(16px, 4vw, 28px);
      align-items:center;
      min-width:0;
    }

    .photo {
      aspect-ratio:1;
      border-radius:50%;
      overflow:hidden;
      border:5px solid white;
      box-shadow:0 0 0 2px rgba(102,121,135,.55),
                 0 12px 28px rgba(25,27,29,.12);
      background:#ddd;
    }

    .photo img {
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:50% 40%;
      display:block;
    }

    h1 {
      margin:0;
      font-size:clamp(2rem, 8vw, 3.7rem);
      line-height:.98;
      letter-spacing:-.055em;
      font-weight:800;
    }

    .role {
      margin:10px 0 0;
      color:var(--muted);
      font-size:clamp(.92rem, 3.3vw, 1.2rem);
      line-height:1.25;
      font-weight:700;
    }

    .institution {
      margin:11px 0 0;
      color:#343638;
      font-size:clamp(.77rem, 2.7vw, .98rem);
      line-height:1.4;
      max-width:390px;
    }

    .accent-mark {
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:10px;
    }

    .accent-mark::before {
      content:"";
      width:54px;
      height:3px;
      border-radius:999px;
      background:var(--accent);
    }

    .accent-mark::after {
      content:"";
      width:6px;
      height:6px;
      border-radius:50%;
      background:var(--accent);
    }

    .tags {
      margin:0;
      padding:9px 14px;
      border:1px solid var(--line);
      border-radius:17px;
      background:rgba(243,243,240,.78);
      color:#303234;
      text-align:center;
      font-size:clamp(.72rem, 2.7vw, .92rem);
      line-height:1.35;
    }

    .site-link {
      min-height:58px;
      border:1px solid var(--line);
      border-radius:20px;
      background:white;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      color:var(--ink);
      text-decoration:none;
      font-weight:800;
      font-size:clamp(1.15rem, 5.6vw, 2rem);
      letter-spacing:-.025em;
      box-shadow:0 7px 18px rgba(32,33,36,.05);
    }

    .globe {
      width:38px;
      height:38px;
      flex:0 0 auto;
      border-radius:50%;
      background:var(--accent);
      color:white;
      display:grid;
      place-items:center;
    }

    .globe svg {
      width:23px;
      height:23px;
      fill:none;
      stroke:currentColor;
      stroke-width:1.7;
    }

    .qr-panel {
      min-height:0;
      display:grid;
      place-items:center;
      align-content:center;
      border:1px solid var(--line);
      border-radius:28px;
      background:white;
      padding:clamp(12px, 2.4vh, 22px);
      cursor:zoom-in;
      box-shadow:0 10px 24px rgba(32,33,36,.06);
    }

    .qr-image {
      width:min(100%, 51dvh, 450px);
      max-height:100%;
      aspect-ratio:1;
      object-fit:contain;
      image-rendering:pixelated;
      display:block;
    }

    .visitor-actions {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
    }

    .action {
      min-height:48px;
      border:1px solid var(--line);
      border-radius:15px;
      background:var(--soft);
      color:#333638;
      text-decoration:none;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      font-size:.69rem;
      font-weight:700;
      cursor:pointer;
    }

    .action svg {
      width:18px;
      height:18px;
      fill:none;
      stroke:currentColor;
      stroke-width:1.9;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .install-area {
      display:none;
      justify-content:center;
      padding-top:2px;
    }

    .install-area.visible {
      display:flex;
    }

    .install-button {
      min-height:44px;
      padding:10px 18px;
      border:1px solid var(--line);
      border-radius:15px;
      background:#2f3133;
      color:white;
      font-weight:750;
      cursor:pointer;
      box-shadow:0 7px 16px rgba(32,33,36,.12);
    }

    body.installed .visitor-actions,
    body.installed .install-area {
      display:none !important;
    }

    body.installed .app {
      grid-template-rows:auto auto auto minmax(300px,1fr);
    }

    .language-switch {
      position:fixed;
      left:max(8px, env(safe-area-inset-left));
      bottom:max(8px, env(safe-area-inset-bottom));
      z-index:70;
      display:flex;
      gap:2px;
      padding:3px;
      border:1px solid rgba(80,84,88,.24);
      border-radius:999px;
      background:rgba(252,252,250,.85);
      box-shadow:0 3px 10px rgba(32,33,36,.08);
      backdrop-filter:blur(7px);
    }

    .language-switch button {
      border:0;
      border-radius:999px;
      background:transparent;
      color:#64696e;
      font-size:.66rem;
      font-weight:800;
      line-height:1;
      padding:6px 8px;
      cursor:pointer;
    }

    .language-switch button[aria-pressed="true"] {
      background:#303235;
      color:white;
    }

    .zoom {
      position:fixed;
      inset:0;
      z-index:40;
      display:none;
      place-items:center;
      background:#efefec;
      padding:
        max(16px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(48px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
      cursor:zoom-out;
    }

    .zoom.open {
      display:grid;
    }

    .zoom-card {
      width:min(94vw, 660px);
      max-height:94dvh;
      padding:clamp(18px, 4vw, 30px);
      border:1px solid var(--line);
      border-radius:32px;
      background:var(--paper);
      box-shadow:var(--shadow);
      display:grid;
      grid-template-rows:auto auto minmax(0,1fr);
      gap:14px;
      overflow:hidden;
      cursor:default;
    }

    .zoom-identity {
      display:grid;
      grid-template-columns:84px 1fr;
      gap:16px;
      align-items:center;
    }

    .zoom-photo {
      width:84px;
      height:84px;
      border-radius:50%;
      overflow:hidden;
      border:4px solid white;
      box-shadow:0 0 0 2px rgba(102,121,135,.50);
    }

    .zoom-photo img {
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:50% 40%;
      display:block;
    }

    .zoom-identity h2 {
      margin:0;
      font-size:clamp(1.8rem, 7vw, 3rem);
      line-height:1;
      letter-spacing:-.045em;
    }

    .zoom-identity p {
      margin:8px 0 0;
      color:var(--muted);
      font-weight:750;
      font-size:clamp(.9rem, 3vw, 1.1rem);
    }

    .zoom-site {
      min-height:52px;
      border:1px solid var(--line);
      border-radius:17px;
      background:white;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      color:var(--ink);
      text-decoration:none;
      font-weight:800;
      font-size:clamp(1.05rem, 4.6vw, 1.55rem);
      letter-spacing:-.02em;
    }

    .zoom-qr {
      width:min(100%, 62dvh, 520px);
      max-height:100%;
      aspect-ratio:1;
      object-fit:contain;
      image-rendering:pixelated;
      display:block;
      margin:auto;
    }

    @media (max-width:420px) {
      body { padding:0; }

      .app {
        min-height:100dvh;
        max-height:none;
        border:0;
        border-radius:0;
        box-shadow:none;
      }

      .identity {
        grid-template-columns:104px 1fr;
      }
    }

    @media (max-height:760px) {
      .app {
        gap:8px;
        padding-top:12px;
      }

      .identity {
        grid-template-columns:86px 1fr;
        gap:14px;
      }

      .role,
      .institution,
      .accent-mark {
        margin-top:5px;
      }

      .tags {
        padding:6px 10px;
      }

      .site-link {
        min-height:48px;
      }

      .qr-panel {
        padding:8px;
      }

      .qr-image {
        width:min(100%, 45dvh, 380px);
      }
    }

    @media (prefers-reduced-motion:reduce) {
      * {
        scroll-behavior:auto !important;
        transition:none !important;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="identity">
      <div class="photo">
        <img src="./assets/daniel-goya.jpg" alt="Daniel Goya" width="900" height="900">
      </div>
      <div>
        <h1>Daniel Goya</h1>
        <p class="role" data-es="Economista" data-en="Economist">Economista</p>
        <div class="accent-mark" aria-hidden="true"></div>
        <p class="institution"
           data-es="Escuela de Negocios y Economía · Pontificia Universidad Católica de Valparaíso"
           data-en="School of Business and Economics · Pontificia Universidad Católica de Valparaíso">
          Escuela de Negocios y Economía · Pontificia Universidad Católica de Valparaíso
        </p>
      </div>
    </header>

    <p class="tags"
       data-es="Innovación · Desarrollo productivo · Políticas públicas"
       data-en="Innovation · Productive development · Public policy">
      Innovación · Desarrollo productivo · Políticas públicas
    </p>

    <a class="site-link" href="https://danielgoya.github.io/" target="_blank" rel="noopener">
      <span class="globe" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M3 12h18"></path>
          <path d="M12 3a15 15 0 0 1 0 18"></path>
          <path d="M12 3a15 15 0 0 0 0 18"></path>
        </svg>
      </span>
      <span>danielgoya.github.io</span>
    </a>

    <section class="qr-panel" id="qr-panel" aria-label="Ampliar código QR">
      <img class="qr-image"
           src="./assets/qr-contacto-v5.png"
           alt="Código QR para abrir contacto.html">
    </section>

    <nav class="visitor-actions" aria-label="Acciones de contacto">
      <button class="action" id="save-contact" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3v12"></path>
          <path d="m7 10 5 5 5-5"></path>
          <path d="M5 21h14"></path>
        </svg>
        <span data-es="Guardar" data-en="Save">Guardar</span>
      </button>

      <a class="action" id="whatsapp-link" href="#" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20.5 11.5a8.5 8.5 0 0 1-12.6 7.4L3 20l1.2-4.6A8.5 8.5 0 1 1 20.5 11.5z"></path>
          <path d="M8.7 7.8c.2-.4.4-.4.7-.4h.5c.2 0 .4 0 .5.4l.8 1.8c.1.3.1.5-.1.7l-.6.7"></path>
        </svg>
        <span>WhatsApp</span>
      </a>

      <a class="action" id="email-link" href="#">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="5" width="18" height="14" rx="2"></rect>
          <path d="m3 7 9 6 9-6"></path>
        </svg>
        <span data-es="Correo" data-en="Email">Correo</span>
      </a>

      <a class="action" href="https://danielgoya.github.io/" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M3 12h18"></path>
          <path d="M12 3a15 15 0 0 1 0 18"></path>
        </svg>
        <span data-es="Sitio" data-en="Website">Sitio</span>
      </a>
    </nav>

    <div class="install-area" id="install-area">
      <button class="install-button" id="install-button" type="button">
        <span data-es="Instalar tarjeta en este teléfono"
              data-en="Install contact card on this phone">
          Instalar tarjeta en este teléfono
        </span>
      </button>
    </div>
  </main>

  <div class="language-switch" aria-label="Idioma">
    <button type="button" id="lang-es" aria-pressed="true">ES</button>
    <button type="button" id="lang-en" aria-pressed="false">EN</button>
  </div>

  <div class="zoom" id="zoom" role="dialog" aria-modal="true"
       aria-label="Código QR ampliado">
    <div class="zoom-card">
      <header class="zoom-identity">
        <div class="zoom-photo">
          <img src="./assets/daniel-goya.jpg" alt="Daniel Goya">
        </div>
        <div>
          <h2>Daniel Goya</h2>
          <p data-es="Economista" data-en="Economist">Economista</p>
        </div>
      </header>

      <a class="zoom-site" href="https://danielgoya.github.io/"
         target="_blank" rel="noopener">
        <span class="globe" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M3 12h18"></path>
            <path d="M12 3a15 15 0 0 1 0 18"></path>
            <path d="M12 3a15 15 0 0 0 0 18"></path>
          </svg>
        </span>
        <span>danielgoya.github.io</span>
      </a>

      <img class="zoom-qr"
           src="./assets/qr-contacto-v5.png"
           alt="Código QR ampliado">
    </div>
  </div>

  <script>
    (() => {
      const standalone =
        window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true;

      document.body.classList.toggle("installed", standalone);

      const phone = ["56","9","8844","8384"].join("");
      const email = ["daniel.goya","pucv.cl"].join("@");
      document.getElementById("whatsapp-link").href = "https://wa.me/" + phone;
      document.getElementById("email-link").href = "mailto:" + email;

      // ES / EN
      const langEs = document.getElementById("lang-es");
      const langEn = document.getElementById("lang-en");

      function setLanguage(lang) {
        document.documentElement.lang = lang;
        document.querySelectorAll("[data-es][data-en]").forEach((node) => {
          node.textContent = node.dataset[lang];
        });

        langEs.setAttribute("aria-pressed", String(lang === "es"));
        langEn.setAttribute("aria-pressed", String(lang === "en"));
        localStorage.setItem("dg-card-language", lang);
      }

      langEs.addEventListener("click", () => setLanguage("es"));
      langEn.addEventListener("click", () => setLanguage("en"));

      if (localStorage.getItem("dg-card-language") === "en") {
        setLanguage("en");
      }

      // Installation button: only before installation.
      let installPrompt = null;
      const installArea = document.getElementById("install-area");
      const installButton = document.getElementById("install-button");

      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        installPrompt = event;
        if (!standalone) installArea.classList.add("visible");
      });

      installButton.addEventListener("click", async () => {
        if (!installPrompt) return;
        installPrompt.prompt();
        await installPrompt.userChoice;
        installPrompt = null;
        installArea.classList.remove("visible");
      });

      window.addEventListener("appinstalled", () => {
        installArea.classList.remove("visible");
        document.body.classList.add("installed");
      });

      // Generate and download the contact locally.
      document.getElementById("save-contact").addEventListener("click", () => {
        const vcard = [
          "BEGIN:VCARD",
          "VERSION:3.0",
          "N:Goya León;Daniel Ignacio;;Dr.;",
          "FN:Daniel Goya",
          "ORG:Pontificia Universidad Católica de Valparaíso;Escuela de Negocios y Economía",
          "TITLE:Economista",
          "EMAIL;TYPE=INTERNET,WORK:" + email,
          "TEL;TYPE=CELL,VOICE,PREF:+" + phone,
          "TEL;TYPE=WORK,VOICE:+56322273585",
          "URL:https://danielgoya.github.io/",
          "URL;TYPE=ORCID:https://orcid.org/0000-0003-0461-845X",
          "ADR;TYPE=WORK:;;Amunátegui 1838\\, Recreo;Viña del Mar;;;Chile",
          "NOTE:Innovación\\, desarrollo productivo y políticas públicas.",
          "END:VCARD"
        ].join("\r\n");

        const blob = new Blob([vcard], {
          type:"text/vcard;charset=utf-8"
        });

        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Daniel-Goya.vcf";
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(link.href), 1500);
      });

      // QR zoom.
      const zoom = document.getElementById("zoom");
      const zoomCard = document.querySelector(".zoom-card");

      document.getElementById("qr-panel").addEventListener("click", () => {
        zoom.classList.add("open");
        requestWakeLock();
      });

      zoom.addEventListener("click", (event) => {
        if (event.target === zoom) zoom.classList.remove("open");
      });

      zoomCard.addEventListener("click", (event) => {
        event.stopPropagation();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") zoom.classList.remove("open");
      });

      // Keep the screen awake while the card is being shown.
      let wakeLock = null;

      async function requestWakeLock() {
        try {
          if ("wakeLock" in navigator && !wakeLock) {
            wakeLock = await navigator.wakeLock.request("screen");
            wakeLock.addEventListener("release", () => {
              wakeLock = null;
            });
          }
        } catch (_) {}
      }

      document.addEventListener("pointerdown", requestWakeLock, { once:true });

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") requestWakeLock();
      });

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(console.debug);
        });
      }
    })();
  </script>
</body>
</html>

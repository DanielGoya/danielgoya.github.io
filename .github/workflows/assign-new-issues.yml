name: Assign new issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest
    env:
      DESIGNATED_ISSUE_AGENT: Codex (GPT 5.6 Sol)
      # GitHub requires an eligible GitHub login. Codex has no assignable login.
      DESIGNATED_ISSUE_AGENT_LOGIN: ""
    steps:
      - name: Assign eligible participants
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const creator = context.payload.issue.user.login;
            const assigned = new Set(
              (context.payload.issue.assignees || []).map(({ login }) => login)
            );

            const candidates = [
              { role: "issue creator", login: creator },
            ];

            const agentLogin = process.env.DESIGNATED_ISSUE_AGENT_LOGIN.trim();
            if (agentLogin) {
              candidates.push({ role: "designated coding agent", login: agentLogin });
            } else {
              core.notice(
                `${process.env.DESIGNATED_ISSUE_AGENT} is the designated coding agent, ` +
                "but it has no supported GitHub login and cannot be assigned."
              );
            }

            for (const candidate of candidates) {
              if (assigned.has(candidate.login)) {
                core.notice(`${candidate.login} is already assigned.`);
                continue;
              }

              try {
                await github.rest.issues.checkUserCanBeAssigned({
                  owner,
                  repo,
                  assignee: candidate.login,
                });

                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number,
                  assignees: [candidate.login],
                });
                core.notice(`Assigned ${candidate.role}: ${candidate.login}.`);
              } catch (error) {
                core.warning(
                  `Could not assign ${candidate.role} ${candidate.login}: ` +
                  `${error.status || "unknown status"} ${error.message}`
                );
              }
            }
